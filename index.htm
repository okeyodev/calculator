<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Okeyode Victor">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calculator.js" defer></script>
  </head>

  <body>
    <section id="output">
      <div id="expression">50+50</div>
      <div id="result">100</div>
    </section>
    <!-- Buttons -->
    <section id="input">
      <button class="btn light" data-action="clear" data-value="C">C</button>
      <button class="btn light" data-action="negate" data-value="">+/-</button>
      <button class="btn light" data-action="mod" data-value="%">%</button>
      <button class="btn dark" data-action="division" data-value="/">/</button>

      <button class="btn purple" data-action="number" data-value="7">7</button>
      <button class="btn purple" data-action="number" data-value="8">8</button>
      <button class="btn purple" data-action="number" data-value="9">9</button>
      <button class="btn dark" data-action="multiplication" data-value="*">&times;</button>

      <button class="btn purple" data-action="number" data-value="4" data-value="4">4</button>
      <button class="btn purple" data-action="number" data-value="5">5</button>
      <button class="btn purple" data-action="number" data-value="6">6</button>
      <button class="btn dark" data-action="subtraction" data-value="-">-</button>
      
      <button class="btn purple" data-action="number" data-value="1">1</button>
      <button class="btn purple" data-action="number" data-value="2">2</button>
      <button class="btn purple" data-action="number" data-value="3">3</button>
      <button class="btn dark" data-action="addition" data-value="+">+</button>

      <button class="btn purple" data-action="decimal" data-value=".">.</button>
      <button class="btn purple" data-action="number" data-value="0">0</button>
      <button class="btn purple" data-action="backspace">&#9003;</button>
      <button class="btn dark" data-action="submit" data-value="=">=</button>

    </section>
  </body>

</html>
